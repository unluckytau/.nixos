[bar]
order = [ "Island" ]

    [bar.Island]
    concave_edge_corners = false
    end = [ "tray", "volume", "battery" ]
    font_family = "SF Pro Rounded"
    hover_highlight = false
    margin_edge = 5
    margin_ends = 700
    padding = 20
    radius_bottom_left = 80
    radius_bottom_right = 80
    radius_top_left = 80
    radius_top_right = 80
    scale = 0.95000000670552254
    shadow = false
    start = [ "workspaces" ]
    widget_spacing = 8

[control_center]
hidden_tabs = [
    "media",
    "audio",
    "monitor",
    "system",
    "power",
    "network",
    "bluetooth",
    "weather",
    "calendar",
    "notifications",
    "screen-time"
]
sidebar = "none"
sidebar_section = "none"
width = 600

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "power_profile"

    [[control_center.shortcuts]]
    type = "audio"

[desktop_widgets]
enabled = false

[dock]
concave_edge_corners = false
magnification = false
reserve_space = false
shadow = false
show_instance_count = false
show_running = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1", "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 640.0
    cy = 601.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[[plugins.source]]
enabled = false
kind = "git"
location = "https://github.com/noctalia-dev/official-plugins"
name = "official"

[[plugins.source]]
enabled = false
kind = "git"
location = "https://github.com/noctalia-dev/community-plugins"
name = "community"

[shell]
corner_radius_scale = 2.0
font_family = "SF Pro Display"
time_format = "{:%-I:%M %p}"

    [shell.animation]
    enabled = false

    [shell.launcher]
    categories = false
    sort_by_usage = false

    [shell.panel]
    borders = false
    control_center_placement = "floating"
    shadow = false

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = false
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = false
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "5"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.0
    direction = "center"

[theme]
builtin = "Kanagawa"
custom_palette = "ember"
mode = "dark"
source = "custom"
wallpaper_scheme = "muted"

    [theme.templates]
    enable_builtin_templates = false
    enable_community_templates = false

[wallpaper]
directory = "/home/tau/Downloads/zeta/pics"
transition = [ "disc" ]
transition_on_startup = true

    [wallpaper.default]
    path = "/home/tau/Downloads/zeta/pics/yanikowp_.png"

    [wallpaper.last]
    path = "/home/tau/Downloads/zeta/pics/yanikowp_.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/tau/Downloads/zeta/pics/yanikowp_.png"

    [[wallpaper.favorite]]
    builtin_palette = "Kanagawa"
    palette_source = "builtin"
    path = "/home/tau/Downloads/zeta/pics/yanikowp_.png"
    theme_mode = "dark"

[weather]
effects = false
enabled = false

[widget.clock]
format = "{:%-I:%M %p}"

[widget.network]
show_label = false

[widget.volume]
font_weight = 500

[widget.workspaces]
empty_color = "on_surface_variant"
enabled = true
focused_color = "primary"
max_label_chars = 4
minimal = true
occupied_color = "on_surface_variant"
