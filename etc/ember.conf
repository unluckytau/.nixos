# vim:ft=kitty

## name:     Ember
## blurb:    A warm, monochrome color theme. One vivid coral spark in a sea of warm graphite.
## upstream: https://github.com/ember-theme/ember

# The basic colors
background              #1c1b19
foreground              #d8d0c0
selection_background    #3a3833
selection_foreground    #d8d0c0

# Cursor colors
cursor                  #e08060
cursor_text_color       #1c1b19

# URL underline color when hovering with mouse
url_color               #e08060

# Kitty window border colors
active_border_color     #e08060
inactive_border_color   #3a3833
bell_border_color       #c8b468

# OS Window titlebar colors
wayland_titlebar_color  system
macos_titlebar_color    system

# Tab bar colors
active_tab_foreground   #1c1b19
active_tab_background   #e08060
inactive_tab_foreground #988090
inactive_tab_background #242320
tab_bar_background      #1c1b19

# Marks
mark1_foreground #1c1b19
mark1_background #e08060
mark2_foreground #1c1b19
mark2_background #c8b468
mark3_foreground #1c1b19
mark3_background #7890a0

# The 16 terminal colors

# black
color0  #1c1b19
color8  #56544e

# red (coral — hero accent)
color1  #e08060
color9  #e8957a

# green (olive — strings)
color2  #8a9868
color10 #9dab7b

# yellow (gold — functions, types)
color3  #c8b468
color11 #d4c280

# blue (steel — muted blue)
color4  #7890a0
color12 #8ea4b3

# magenta (rose — dusty rose)
color5  #b07878
color13 #bf8c8c

# cyan (sage — methods)
color6  #80a090
color14 #95b3a4

# white
color7  #d8d0c0
color15 #ece4d4
