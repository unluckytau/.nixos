format = """
[](fg:bg)\
$directory\
[](fg:surface0 bg:surface1)\
$git_branch\
$git_status\
[](fg:surface1)\
$fill\
$cmd_duration\
$c\
$cpp\
${custom.css}\
${custom.nix}\
$python\
$rust\
$lua\
${custom.typst}\
${custom.bash}\
${custom.markdown}\
$time\
$line_break\
$character"""

add_newline = true
palette = "ember"

[directory]
style = "fg:gold"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = false
read_only = " 󰌾"
read_only_style = "fg:rose"

[character]
success_symbol = '[  ](bold coral)'
error_symbol = '[  ](bold rose)'
vimcmd_symbol = '[❮](bold sage)'

[git_branch]
symbol = ""
style = "fg:olive"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:orange"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = '+${count}'
renamed = "»${count}"
deleted = "✘${count}"

[fill]
symbol = ' '

[c]
symbol = " "
style = "fg:steel"
format = '[ $symbol $version ]($style)'

[cpp]
symbol = " "
style = "fg:steel"
format = '[ $symbol $version ]($style)'

[python]
symbol = "󰌠"
style = "fg:steel"
format = '[ $symbol $version ]($style)'

[rust]
symbol = "󱘗"
style = "fg:coral"
format = '[ $symbol $version ]($style)'

[lua]
symbol = "󰢱"
style = "fg:steel"
format = '[ $symbol $version ]($style)'

[custom.css]
symbol = " "
style = "fg:mauve"
format = '[ $symbol ]($style)'
detect_extensions = ["css", "scss", "sass", "less"]

[custom.nix]
symbol = " "
style = "fg:steel"
format = '[ $symbol ]($style)'
detect_extensions = ["nix"]
detect_files = ["flake.nix", "shell.nix", "default.nix"]

[custom.typst]
symbol = " "
style = "fg:gold"
format = '[ $symbol ]($style)'
detect_extensions = ["typ"]

[custom.bash]
symbol = " "
style = "fg:sage"
format = '[ $symbol ]($style)'
detect_extensions = ["sh", "bash"]
detect_files = [".bashrc", ".bash_profile"]

[custom.markdown]
symbol = "󰍔 "
style = "fg:fg_alt"
format = '[ $symbol ]($style)'
detect_extensions = ["md", "markdown"]

[time]
disabled = false
time_format = "%R"
style = "fg:subtle"
format = '[ 󰥔 $time ]($style)'

[cmd_duration]
min_time = 500
style = "fg:muted"
format = "[ 󰔛 $duration ]($style)"

[palettes.ember]
bg       = "#1c1b19"
fg       = "#d8d0c0"
surface0 = "#272623"
surface1 = "#363430"
muted    = "#5e5a53"
subtle   = "#837f75"
fg_alt   = "#b0a898"
coral    = "#e08060"
orange   = "#c09058"
gold     = "#c8b468"
olive    = "#8a9868"
sage     = "#80a090"
steel    = "#7890a0"
rose     = "#b07878"
mauve    = "#988090"
