format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = 'ember'

[directory]
style = 'bold rose'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[character]
success_symbol = '[ ](bold green)'
error_symbol = '[ ](bold red)'

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
symbol = ' '
style = 'fg:gray'
format = '[on]($style) [$symbol$branch ](bold blue)'

[git_status]
style = 'fg:bold red'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'yellow'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
symbol = ' '

[nodejs]
style = 'green'
symbol = ' '

[rust]
style = 'orange'
symbol = ' '

[package]
symbol = '󰏗 '

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'italic fg:yellow'
format = 'took [$duration]($style)'

[palettes.ember]
bg0    = "#1c1b19"
fg0    = "#d8d0c0"
red    = "#e08060"
green  = "#8a9868"
yellow = "#c8b468"
blue   = "#7890a0"
purple = "#988090"
aqua   = "#80a090"
orange = "#c09058"
gray   = "#706c61"
rose   = "#b07878"
